<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>朝暮日记 Android</title>
  <link rel="icon" href="../assets/chaomu-icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="android.css">
</head>
<body>
  <main class="mobile-app">
    <header class="mobile-head">
      <div class="brand-line">
        <img src="../assets/chaomu-icon.svg" alt="朝暮日记 Logo">
        <div>
          <span>5月17日</span>
          <strong>晚上好，林夏</strong>
        </div>
      </div>
      <a class="icon-button" href="../windows/index.html" title="打开 Windows 端">Win</a>
    </header>

    <section class="hero-image">
      <img src="../assets/chaomu-logo.svg" alt="夜晚通勤时用手机写日记">
      <div>
        <span>今日同步</span>
        <strong id="heroSyncText">同步服务已连接</strong>
      </div>
    </section>

    <section id="writeView" class="app-view active" data-view="write">
      <div class="compose-card">
        <div class="compose-meta">
          <span class="mood-dot calm"></span>
          <span id="syncStatus">本地已保存 · 等待同步</span>
        </div>
        <input id="mobileTitle" class="mobile-title" value="" placeholder="新的日记" aria-label="日记标题">
        <textarea id="mobileText" class="mobile-text" spellcheck="false" placeholder="写下今天。"></textarea>
        <div class="mobile-tools">
          <button id="newMobileEntryButton" type="button">新建</button>
          <button data-tool="photo" type="button">上传图片</button>
          <button data-tool="voice" type="button">上传语音</button>
          <button data-tool="private" type="button">私密</button>
          <button id="deleteMobileEntryButton" class="danger" type="button">删除</button>
        </div>
        <input id="mobileImageUpload" class="file-input" type="file" accept="image/*" multiple>
        <input id="mobileVoiceUpload" class="file-input" type="file" accept="audio/*">
      </div>

      <div id="toolPanel" class="tool-panel">
        <strong>附件</strong>
        <span>还没有上传图片或语音。</span>
      </div>

      <section class="mobile-section">
        <div class="section-title">
          <h2>今日照片</h2>
          <span id="photoCount">0 张</span>
        </div>
        <div class="photo-strip" id="photoStrip">
          <div class="empty-photo">还没有上传图片</div>
        </div>
      </section>
    </section>

    <section id="readView" class="app-view" data-view="read">
      <section class="mobile-section first-section">
        <div class="section-title">
          <h2>时间线</h2>
          <span id="timelineCount">0 天</span>
        </div>
        <div class="timeline" id="timelineList">
          <article class="active" data-entry="0">
            <time>今天</time>
            <div>
              <strong>暂无日记</strong>
              <p>新建一篇后会出现在这里。</p>
            </div>
          </article>
        </div>
      </section>

      <article class="reader-card" id="readerCard">
        <img src="../assets/chaomu-logo.svg" alt="日记插图">
        <div>
          <span id="readerDate">暂无记录</span>
          <h2 id="readerTitle">还没有日记</h2>
          <p id="readerText">新建一篇日记后，这里会显示正文。</p>
        </div>
      </article>
    </section>

    <section id="calendarView" class="app-view" data-view="calendar">
      <section class="mobile-section first-section">
        <div class="section-title">
          <h2>五月回顾</h2>
          <span id="mobileCalendarSummary">0 / 31</span>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </section>

      <section class="mobile-section compact-section">
        <div class="section-title">
          <h2>情绪</h2>
          <span>本周</span>
        </div>
        <div class="mobile-moods" id="mobileMoods">
          <button class="calm active" data-mood="平静" data-class="calm" type="button" aria-label="平静"></button>
          <button class="bright" data-mood="开心" data-class="bright" type="button" aria-label="开心"></button>
          <button class="warm" data-mood="温暖" data-class="warm" type="button" aria-label="温暖"></button>
          <button class="low" data-mood="低落" data-class="low" type="button" aria-label="低落"></button>
        </div>
      </section>
    </section>

    <section id="profileView" class="app-view" data-view="profile">
      <section class="profile-card first-section">
        <img src="../assets/chaomu-logo.svg" alt="朝暮日记品牌">
        <div class="profile-stats">
          <div><strong id="profileEntryCount">0</strong><span>记录篇数</span></div>
          <div><strong id="profileImageCount">0</strong><span>图片</span></div>
          <div><strong id="profilePrivateCount">0</strong><span>私密篇</span></div>
        </div>
      </section>

      <section class="mobile-section sync-card">
        <div>
          <span>同步服务</span>
          <strong id="profileSync">自动同步已开启</strong>
        </div>
        <button id="toggleSyncButton" type="button">暂停同步</button>
      </section>
    </section>

    <nav class="bottom-nav" aria-label="移动端导航">
      <button class="active" data-target="write" type="button">写</button>
      <button data-target="read" type="button">读</button>
      <button data-target="calendar" type="button">看</button>
      <button data-target="profile" type="button">我</button>
    </nav>
  </main>

  <script src="android.js"></script>
</body>
</html>
