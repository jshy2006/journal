<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>朝暮日记 Android</title>
  <link rel="icon" href="../assets/chaomu-icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="android.css">
</head>
<body>
  <main class="mobile-app">
    <header class="mobile-head">
      <div class="brand-line">
        <img src="../assets/chaomu-icon.svg" alt="朝暮日记 Logo">
        <div>
          <span>5月17日</span>
          <strong>晚上好，林夏</strong>
        </div>
      </div>
      <a class="icon-button" href="../windows/index.html" title="打开 Windows 端">Win</a>
    </header>

    <section class="hero-image">
      <img src="../assets/illustrations/mobile-writing.png" alt="夜晚通勤时用手机写日记">
      <div>
        <span>今日同步</span>
        <strong id="heroSyncText">同步服务已连接</strong>
      </div>
    </section>

    <section id="writeView" class="app-view active" data-view="write">
      <div class="compose-card">
        <div class="compose-meta">
          <span class="mood-dot calm"></span>
          <span id="syncStatus">本地已保存 · 等待同步</span>
        </div>
        <input id="mobileTitle" class="mobile-title" value="雨停以后" aria-label="日记标题">
        <textarea id="mobileText" class="mobile-text" spellcheck="false">便利店门口的灯把雨水照得像一层薄玻璃。今天终于没有急着把一天过成清单。</textarea>
        <div class="mobile-tools">
          <button data-tool="photo" type="button">图片</button>
          <button data-tool="voice" type="button">语音</button>
          <button data-tool="private" type="button">私密</button>
        </div>
      </div>

      <div id="toolPanel" class="tool-panel">
        <strong>图片素材</strong>
        <span>已添加 2 张今日照片，可继续补充。</span>
      </div>

      <section class="mobile-section">
        <div class="section-title">
          <h2>今日照片</h2>
          <span>2 张</span>
        </div>
        <div class="photo-strip">
          <img src="../assets/illustrations/diary-desk.png" alt="雨后书桌和日记本">
          <img src="../assets/illustrations/secure-sync.png" alt="安全同步示意图">
        </div>
      </section>
    </section>

    <section id="readView" class="app-view" data-view="read">
      <section class="mobile-section first-section">
        <div class="section-title">
          <h2>时间线</h2>
          <span>18 天</span>
        </div>
        <div class="timeline" id="timelineList">
          <article class="active" data-entry="0">
            <time>今天</time>
            <div>
              <strong>雨停以后</strong>
              <p>散步，热牛奶，薄荷。</p>
            </div>
          </article>
          <article data-entry="1">
            <time>昨天</time>
            <div>
              <strong>把房间收亮一点</strong>
              <p>整理书桌和床单。</p>
            </div>
          </article>
          <article data-entry="2">
            <time>周五</time>
            <div>
              <strong>给未来的自己</strong>
              <p>没有逃走，也值得记录。</p>
            </div>
          </article>
        </div>
      </section>

      <article class="reader-card" id="readerCard">
        <img src="../assets/illustrations/diary-desk.png" alt="日记插图">
        <div>
          <span id="readerDate">今天 21:34</span>
          <h2 id="readerTitle">雨停以后</h2>
          <p id="readerText">便利店门口的灯把雨水照得像一层薄玻璃。今天终于没有急着把一天过成清单。</p>
        </div>
      </article>
    </section>

    <section id="calendarView" class="app-view" data-view="calendar">
      <section class="mobile-section first-section">
        <div class="section-title">
          <h2>五月回顾</h2>
          <span>18 / 31</span>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </section>

      <section class="mobile-section compact-section">
        <div class="section-title">
          <h2>情绪</h2>
          <span>本周</span>
        </div>
        <div class="mobile-moods">
          <span class="calm"></span>
          <span class="bright"></span>
          <span class="warm"></span>
          <span class="calm"></span>
          <span class="low"></span>
          <span class="bright"></span>
          <span class="calm active"></span>
        </div>
      </section>
    </section>

    <section id="profileView" class="app-view" data-view="profile">
      <section class="profile-card first-section">
        <img src="../assets/chaomu-logo.svg" alt="朝暮日记品牌">
        <div class="profile-stats">
          <div><strong>18</strong><span>记录天数</span></div>
          <div><strong>9</strong><span>图片</span></div>
          <div><strong>4</strong><span>私密篇</span></div>
        </div>
      </section>

      <section class="mobile-section sync-card">
        <div>
          <span>同步服务</span>
          <strong id="profileSync">自动同步已开启</strong>
        </div>
        <button id="toggleSyncButton" type="button">暂停同步</button>
      </section>
    </section>

    <nav class="bottom-nav" aria-label="移动端导航">
      <button class="active" data-target="write" type="button">写</button>
      <button data-target="read" type="button">读</button>
      <button data-target="calendar" type="button">看</button>
      <button data-target="profile" type="button">我</button>
    </nav>
  </main>

  <script src="android.js"></script>
</body>
</html>
